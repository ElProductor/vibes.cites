<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Configuración PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f13">
</head>
<body class="app-bg p-4 max-w-md mx-auto overflow-x-hidden pb-24">

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-6 mt-2">
        <div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 tracking-tighter">VIBE</h1>
            <div id="welcome-message" class="text-sm text-gray-400 font-medium"></div>
        </div>
        <button onclick="logout()" class="text-xs bg-gray-800 hover:bg-red-600 px-4 py-2 rounded-full text-gray-200 transition-colors">Cerrar Sesión</button>
    </header>

    <!-- STORIES (CARRUSEL HORIZONTAL) -->
    <section class="mb-8">
        <h2 class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-wider">En Vivo Ahora</h2>
        <div id="stories-container" class="flex gap-4 overflow-x-auto pb-2 snap-x scrollbar-hide">
            <p class="text-gray-600 text-sm animate-pulse">Buscando el radar...</p>
        </div>
    </section>

    <!-- MATCHES (CONEXIONES) -->
    <section class="mb-8">
        <h2 class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-wider">Tus Conexiones</h2>
        <div id="matches-container" class="flex gap-4 overflow-x-auto pb-2 snap-x scrollbar-hide">
            <p class="text-gray-600 text-sm animate-pulse">Analizando auras...</p>
        </div>
    </section>

    <!-- LIVE FEED -->
    <section>
        <h2 class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-wider">Pulso de la Ciudad</h2>
        <div class="space-y-4" id="feed-container">
            <p class="text-gray-600 text-sm animate-pulse">Cargando la vibra...</p>
        </div>
    </section>

    <!-- BOTTOM NAV FIJA -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900/90 backdrop-blur-md border-t border-gray-800 flex justify-around p-4 max-w-md mx-auto z-50">
        <button class="text-purple-400 transition transform hover:scale-110">🔥<br><span class="text-[10px]">Feed</span></button>
        <button class="text-gray-500 hover:text-gray-300 transition transform hover:scale-110">📍<br><span class="text-[10px]">Radar</span></button>
        <button class="text-gray-500 hover:text-gray-300 transition transform hover:scale-110">💬<br><span class="text-[10px]">Chats</span></button>
        <button class="text-gray-500 hover:text-gray-300 transition transform hover:scale-110">👤<br><span class="text-[10px]">Perfil</span></button>
    </nav>

    <style>
        /* Ocultar barra de desplazamiento fea, pero permitir el scroll en móvil */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script>
        const token = localStorage.getItem('vibe_token');
        const userStr = localStorage.getItem('vibe_user');

        if (!token) {
            window.location.href = '/'; 
        } else {
            const user = JSON.parse(userStr);
            document.getElementById('welcome-message').innerText = `Hola, ${user.username} ✨`;
            loadDashboard(); // Cargar todas las secciones de la API
        }

        async function loadDashboard() {
            const headers = { 'Authorization': `Bearer ${token}` };

            // Llamamos a las 3 APIs en paralelo para máxima velocidad
            Promise.all([
                fetch('/api/stories', { headers }).then(r => r.json()),
                fetch('/api/matches', { headers }).then(r => r.json()),
                fetch('/api/live-feed', { headers }).then(r => r.json())
            ]).then(([storiesData, matchesData, feedData]) => {
                
                if (storiesData.success) {
                    document.getElementById('stories-container').innerHTML = storiesData.stories.map(s => `
                        <div class="snap-center shrink-0 w-20 flex flex-col items-center gap-1 cursor-pointer transform hover:scale-105 transition">
                            <div class="w-16 h-16 rounded-full p-[2px] ${s.isLive ? 'bg-gradient-to-tr from-pink-500 to-purple-500' : 'bg-gray-700'}">
                                <img src="${s.thumbnail}" class="w-full h-full rounded-full object-cover border-2 border-black">
                            </div>
                            <span class="text-[10px] truncate w-full text-center text-gray-300 font-medium">${s.title}</span>
                        </div>
                    `).join('');
                }

                if (matchesData.success) {
                    document.getElementById('matches-container').innerHTML = matchesData.matches.map(m => `
                        <div class="snap-center shrink-0 w-40 bg-gray-800 rounded-2xl overflow-hidden shadow-lg border border-gray-700 relative cursor-pointer transform hover:scale-105 transition">
                            <img src="${m.avatar}" class="w-full h-48 object-cover opacity-90 hover:opacity-100 transition">
                            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black/80 to-transparent p-3 pt-8">
                                <p class="font-bold text-white text-sm">${m.name}, ${m.age}</p>
                                <p class="text-[10px] text-pink-400 font-bold">${m.synergy}% Sinergia</p>
                            </div>
                        </div>
                    `).join('');
                }

                if (feedData.success) {
                    document.getElementById('feed-container').innerHTML = feedData.feed.map(item => `
                        <div class="bg-gray-900 rounded-2xl overflow-hidden shadow-lg border border-gray-800 transform transition hover:-translate-y-1 cursor-pointer">
                            <img src="${item.image}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <p class="text-xs text-purple-400 font-bold mb-1 uppercase tracking-wide">${item.time}</p>
                                <p class="text-sm text-gray-200">${item.text}</p>
                            </div>
                        </div>
                    `).join('');
                }
            }).catch(e => console.error("Error cargando dashboard:", e));
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }
    </script>
</body>
</html>
