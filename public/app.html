<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-bg p-6 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-purple-400">VIBE Feed</h1>
        <button onclick="logout()" class="text-sm bg-gray-800 px-3 py-1 rounded-full text-gray-300">Salir</button>
    </header>

    <div id="welcome-message" class="mb-6 text-lg font-medium"></div>

    <div class="space-y-4" id="feed-container">
        <p class="text-gray-500 animate-pulse">Cargando la vibra de la ciudad...</p>
    </div>

    <script>
        // 1. Verificar que el usuario tenga un token (esté logeado)
        const token = localStorage.getItem('vibe_token');
        const userStr = localStorage.getItem('vibe_user');

        if (!token) {
            window.location.href = '/'; // Si no hay token, lo echamos al login
        } else {
            const user = JSON.parse(userStr);
            document.getElementById('welcome-message').innerText = `Hola, ${user.username} ✨`;
            loadFeed(); // Cargar datos del backend
        }

        // 2. Consumir la API del Backend usando el Token
        async function loadFeed() {
            try {
                const response = await fetch('/api/live-feed', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    const container = document.getElementById('feed-container');
                    container.innerHTML = data.feed.map(item => `
                        <div class="bg-gray-900 rounded-xl overflow-hidden shadow-lg border border-gray-800">
                            <img src="${item.image}" alt="Event" class="w-full h-40 object-cover">
                            <div class="p-4">
                                <p class="text-xs text-purple-400 font-bold mb-1">${item.time}</p>
                                <p class="text-sm">${item.text}</p>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("Error cargando feed", e); }
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }
    </script>
</body>
</html>
