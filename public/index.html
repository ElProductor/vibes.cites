<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE - Connect your Aura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        .ui-layer { position: relative; z-index: 10; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-panel { background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .tab-btn.active { border-bottom: 2px solid #a855f7; color: #a855f7; }
        #toast { visibility: hidden; min-width: 250px; background-color: #a855f7; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 50; left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 17px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <!-- Fondo 3D Cuántico -->
    <canvas id="vibe-canvas"></canvas>

    <div class="ui-layer">
        <div id="auth-view" class="glass-panel hidden">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 tracking-tighter">VIBE</h1>
                <div id="vibe-aura-indicator" class="w-16 h-1 mx-auto mt-2 rounded-full transition-all duration-300"></div>
            </div>

            <!-- FORMULARIO DE LOGIN -->
            <form id="login-form">
                <div class="flex mb-4 text-sm font-semibold text-gray-400 border-b border-gray-700">
                    <button type="button" class="tab-btn active flex-1 pb-2" onclick="setLoginMethod('phone')">Teléfono</button>
                    <button type="button" class="tab-btn flex-1 pb-2" onclick="setLoginMethod('email')">Correo</button>
                </div>

                <div id="login-method-phone" class="mb-4">
                    <input type="tel" id="login-phone" placeholder="Número de Teléfono" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500">
                </div>
                <div id="login-method-email" class="mb-4 hidden">
                    <input type="email" id="login-email" placeholder="Correo Electrónico" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500">
                </div>

                <div class="mb-6 relative">
                    <input type="password" id="login-pass" placeholder="Contraseña" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500">
                    <button type="button" onclick="togglePassword('login-pass', this)" class="absolute right-3 top-3 text-gray-400">👁️</button>
                </div>

                <button type="submit" id="login-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition-colors shadow-[0_0_15px_rgba(168,85,247,0.4)]">Iniciar Sesión</button>
                
                <div class="my-4 flex items-center before:flex-1 before:border-t before:border-gray-700 after:flex-1 after:border-t after:border-gray-700">
                    <span class="px-3 text-xs text-gray-500 uppercase">O entra con</span>
                </div>

                <div class="flex gap-2 mb-4">
                    <button type="button" onclick="socialLogin('google')" class="flex-1 bg-white text-black font-semibold py-2 rounded-lg flex justify-center items-center gap-2 hover:bg-gray-100 transition"><img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Google</button>
                    <button type="button" onclick="biometricLogin()" class="flex-1 bg-gray-800 text-white font-semibold py-2 rounded-lg flex justify-center items-center gap-2 border border-gray-700 hover:bg-gray-700 transition">🗝️ Passkey</button>
                </div>

                <p class="text-center text-sm text-gray-400">¿No tienes cuenta? <a href="#" onclick="toggleAuth('register')" class="text-purple-400 hover:text-purple-300">Regístrate</a></p>
            </form>

            <!-- FORMULARIO DE REGISTRO -->
            <form id="register-form" class="hidden">
                <div class="flex mb-4 text-sm font-semibold text-gray-400 border-b border-gray-700">
                    <button type="button" class="tab-btn active flex-1 pb-2" onclick="setRegisterMethod('phone')">Teléfono</button>
                    <button type="button" class="tab-btn flex-1 pb-2" onclick="setRegisterMethod('email')">Correo</button>
                </div>

                <input type="text" id="reg-username" placeholder="Nombre de usuario" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white mb-3 focus:outline-none focus:border-purple-500">
                
                <div class="flex gap-2 mb-3">
                    <input type="date" id="reg-dob" class="w-1/2 bg-gray-900 border border-gray-700 rounded-lg p-3 text-gray-400 focus:outline-none focus:border-purple-500">
                    <select id="reg-gender" class="w-1/2 bg-gray-900 border border-gray-700 rounded-lg p-3 text-gray-400 focus:outline-none focus:border-purple-500">
                        <option value="">Género</option>
                        <option value="MALE">Hombre</option>
                        <option value="FEMALE">Mujer</option>
                        <option value="NON_BINARY">No Binario</option>
                    </select>
                </div>

                <div id="reg-method-phone" class="mb-3">
                    <input type="tel" id="reg-phone" placeholder="Número de Teléfono" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500">
                    <div id="reg-otp-group" class="hidden mt-3">
                        <input type="text" id="reg-otp" placeholder="Código SMS (6 dígitos)" class="w-full bg-gray-900 border border-yellow-500 rounded-lg p-3 text-white focus:outline-none text-center tracking-widest text-lg font-mono">
                    </div>
                </div>

                <div id="reg-method-email" class="mb-3 hidden">
                    <input type="email" id="reg-email" placeholder="Correo Electrónico" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500">
                </div>

                <div class="mb-3">
                    <input type="password" id="reg-pass" placeholder="Crear Contraseña" onkeyup="checkPasswordStrength()" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500">
                    <div class="w-full bg-gray-800 h-1 mt-1 rounded-full overflow-hidden"><div id="strength-bar" class="h-full w-0 transition-all duration-300"></div></div>
                </div>
                
                <div class="mb-6">
                    <input type="password" id="reg-pass-confirm" placeholder="Confirmar Contraseña" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500">
                </div>

                <button type="submit" id="reg-btn" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-lg transition-colors shadow-[0_0_15px_rgba(219,39,119,0.4)]">Enviar Código</button>
                
                <p class="text-center text-sm text-gray-400 mt-4">¿Ya tienes cuenta? <a href="#" onclick="toggleAuth('login')" class="text-purple-400 hover:text-purple-300">Inicia Sesión</a></p>
            </form>
        </div>
    </div>

    <div id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
