<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE Cites - Inicia Sesión</title>
    <!-- Usamos Tailwind CSS para un diseño comercial rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e0b2e 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div class="glass-panel p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center">
        <div class="mb-8">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-2">VIBE</h1>
            <p class="text-gray-400 text-sm">Conecta con tu misma sintonía</p>
        </div>

        <!-- Botón de Login con Google que apunta a tu backend -->
        <a href="/auth/google" 
           class="flex items-center justify-center w-full bg-white text-black font-semibold py-3 px-4 rounded-full transition-transform transform hover:scale-105 mb-4">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5 mr-3">
            Continuar con Google
        </a>

        <p class="text-xs text-gray-500 mt-6">Al continuar, aceptas nuestros términos de servicio y políticas de privacidad.</p>
    </div>

    <script>
        // Lógica súper importante: Capturar el Token de la URL después del login
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userStr = urlParams.get('user');
            const error = urlParams.get('error');

            if (error) {
                alert("Hubo un error al iniciar sesión: " + error);
            }

            if (token && userStr) {
                // 1. Guardamos el token en el dispositivo del usuario de forma segura
                localStorage.setItem('vibe_token', token);
                localStorage.setItem('vibe_user', userStr);
                
                // 2. Limpiamos la URL por estética y seguridad, y redirigimos a la app
                window.history.replaceState({}, document.title, "/");
                window.location.href = '/app.html';
            }
        });
    </script>
</body>
</html>
